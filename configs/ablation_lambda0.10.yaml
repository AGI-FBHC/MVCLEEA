model:
  num_classes: 5236
  esm2_dim: 1280
  feature_dim: 128
  num_heads: 4
  max_seq_length: 1024

loss:
  lambda_val: 0.10
  temperature: 0.07
  gamma: 5.0
  label_smoothing: 0.05

training:
  batch_size: 512
  num_epochs: 100
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine
  warmup_epochs: 10
  grad_clip: 1.0
  early_stopping_patience: 10

data:
  processed_dir: data/processed
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  num_workers: 4
  use_filtered_dataset: true
  neg_per_pos: 5

logging:
  log_dir: ./logs
  save_dir: ./checkpoints
